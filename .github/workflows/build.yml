name: Build APK

on: [push]

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Decode release keystore
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
        run: echo "$SIGNING_KEYSTORE" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"

      - name: Build APKs
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          # Retry the Gradle build up to 3 times to mitigate transient cache/service errors
          ATTEMPT=0
          until [ $ATTEMPT -ge 3 ]
          do
            ./gradlew build --no-daemon --stacktrace && break
            ATTEMPT=$((ATTEMPT+1))
            echo "Gradle build failed, retrying ($ATTEMPT/3)..."
            sleep 5
          done
          if [ $ATTEMPT -ge 3 ]; then
            echo "Gradle build failed after 3 attempts"
            exit 1
          fi

      - name: Setup directories
        run:  
          mkdir -p /tmp/placeholderxposedbuild/apks
          mkdir -p /tmp/placeholderxposedbuild/tools

      - name: Move debug APK
        run: mv ./app/build/outputs/apk/debug/app-debug.apk /tmp/placeholderxposedbuild/apks

      - name: Move release APK
        run: mv ./app/build/outputs/apk/release/app-release.apk /tmp/placeholderxposedbuild/apks/app-release.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: /tmp/placeholderxposedbuild/apks/app-debug.apk

      - name: Upload All APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/placeholderxposedbuild/apks/app-release.apk

      - name: Publish release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          # Name must be a bare semver: the Manager parses release.name as a version.
          tag_name: 1.3.${{ github.run_number }}
          name: 1.3.${{ github.run_number }}
          files: /tmp/placeholderxposedbuild/apks/app-release.apk
          make_latest: true